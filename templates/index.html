<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR & AI Document Processor</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/advanced.css') }}">
</head>

<body>
  <div class="app-layout">
    {% include 'components/sidebar.html' %}
    
    <div class="main-content">
      {% include 'components/header.html' %}
      
      <div class="dashboard-content" id="dashboard-advanced">
        {% include 'components/tab_advanced.html' %}
      </div>

      <div class="dashboard-content hidden" id="dashboard-library">
        <div class="card">
            <div class="card-title"><span class="icon">📚</span> Biblioteka dokumentów</div>
            <div id="library-grid" class="library-grid">
                <!-- Dokumenty będą tu ładowane dynamicznie -->
                <div style="padding: 40px; text-align: center; color: var(--text-muted);">Ładowanie biblioteki...</div>
            </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/helpers.js') }}"></script>
  <script src="{{ url_for('static', filename='js/ocr.js') }}"></script>
  <script src="{{ url_for('static', filename='js/advanced.js') }}"></script>
  <script src="{{ url_for('static', filename='js/pozew-process.js') }}"></script>
  <script src="{{ url_for('static', filename='js/library.js') }}"></script>

  <!-- Modal Podglądu -->
  <div id="previewModal" class="modal">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="modalTitle">Podgląd dokumentu</h3>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody">
            <!-- Zawartość podglądu -->
        </div>
    </div>
  </div>
</body>

</html>
