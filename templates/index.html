<!DOCTYPE html>
<html lang="pl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Invoice Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body class="p-6 md:p-10 min-h-screen">
    <div class="max-w-6xl mx-auto">
      <header
        class="flex justify-between items-center mb-10 border-b border-slate-700 pb-5"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-lg flex items-center justify-center text-white font-bold text-lg"
          >
            AI
          </div>
          <h1
            class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent"
          >
            InvoiceAI Pro
          </h1>
        </div>
        <div
          class="text-sm text-slate-400 bg-slate-800 px-4 py-2 rounded-full border border-slate-700"
        >
          Status AI:
          <span class="text-emerald-400 font-mono font-bold animate-pulse"
            >● Online</span
          >
        </div>
      </header>

      <nav class="flex gap-8 mb-8 border-b border-slate-800">
        <button
          onclick="openTab(event, 'ocr')"
          class="tab-btn active pb-3 px-2 font-medium transition-all hover:text-slate-200"
        >
          1. Import & OCR
        </button>
        <button
          onclick="openTab(event, 'template')"
          class="tab-btn pb-3 px-2 font-medium text-slate-400 transition-all hover:text-slate-200"
        >
          2. Import Szablonu
        </button>
        <button
          onclick="openTab(event, 'generate')"
          class="tab-btn pb-3 px-2 font-medium text-slate-400 transition-all hover:text-slate-200"
        >
          3. Generuj Dokument
        </button>
      </nav>

      <div id="ocr" class="tab-content active">
        {% include 'components/tab_ocr.html' %}
      </div>

      <div id="template" class="tab-content">
        {% include 'components/tab_template.html' %}
      </div>

      <div id="generate" class="tab-content">
        {% include 'components/tab_generate.html' %}
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
