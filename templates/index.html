<!DOCTYPE html>
<html lang="pl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Invoice Manager - Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Animacja pojawiania się elementów */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Styl aktywnej karty szablonu */
        .template-card.active { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); background-color: #1e293b; }
    </style>
  </head>
  <body class="p-6 md:p-10 min-h-screen bg-slate-900 text-slate-200 font-sans">
    
    <div class="max-w-5xl mx-auto">
      <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-5">
        <div class="flex items-center gap-3">
             <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">AI</div>
             <h1 class="text-2xl font-bold text-white">InvoiceAI Pro Generator</h1>
         </div>
      </header>

      <section id="step-1" class="mb-10">
        <h2 class="text-lg font-semibold text-slate-400 mb-4 uppercase tracking-wider text-xs">1. Wybierz szablon</h2>
        
        <div id="template-list" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
      </section>

      <div id="editor-area" class="hidden fade-in space-y-10">

        <section id="step-2" class="bg-slate-800 rounded-xl p-6 border border-slate-700 shadow-xl">
            <h2 class="text-lg font-semibold text-slate-400 mb-4 uppercase tracking-wider text-xs flex items-center gap-2">
                <i class="fa-solid fa-eye"></i> Podgląd Szablonu
            </h2>
            
            <div class="relative w-full bg-slate-900 rounded-lg overflow-hidden flex justify-center items-center border border-slate-700 min-h-[300px]">
                <img id="template-preview-img" src="" alt="Podgląd" class="max-w-full max-h-[500px] object-contain shadow-lg" />
                <div class="absolute bottom-4 right-4 bg-black/70 px-3 py-1 rounded text-xs text-white">
                    <span id="preview-name">Nazwa szablonu</span>
                </div>
            </div>
        </section>

        <section id="step-3">
             <h2 class="text-lg font-semibold text-slate-400 mb-4 uppercase tracking-wider text-xs flex items-center gap-2">
                <i class="fa-solid fa-pen-to-square"></i> Dane tekstowe
            </h2>
            <div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700/50">
                <div id="dynamic-inputs" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    </div>
            </div>
        </section>

        <section id="step-4">
            <h2 class="text-lg font-semibold text-slate-400 mb-4 uppercase tracking-wider text-xs flex items-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i> Pliki i załączniki
            </h2>
            <div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700/50">
                 <div id="no-uploads-msg" class="hidden text-slate-500 italic">Ten szablon nie wymaga dodatkowych plików graficznych.</div>
                 
                 <div id="dynamic-uploads" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    </div>
            </div>
        </section>

        <div class="flex justify-end pt-5 border-t border-slate-700">
            <button class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg hover:shadow-blue-500/20 transition-all flex items-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                Generuj Dokument
            </button>
        </div>

      </div> </div>

    <script>
        // SYMULACJA BAZY DANYCH SZABLONÓW
        // W prawdziwej aplikacji te dane pobierzesz z backendu (JSON)
        const templatesData = [
            {
                id: 'tmpl_invoice_basic',
                name: 'Faktura VAT - Standard',
                thumbnail: 'https://via.placeholder.com/150/3b82f6/ffffff?text=FV',
                preview: 'https://via.placeholder.com/800x600/1e293b/ffffff?text=PODGLAD+FAKTURY+VAT',
                // Pola tekstowe
                fields: [
                    { id: 'fv_number', label: 'Numer Faktury', type: 'text', placeholder: 'FV/2024/01/...' },
                    { id: 'fv_date', label: 'Data Wystawienia', type: 'date', placeholder: '' },
                    { id: 'fv_seller', label: 'NIP Sprzedawcy', type: 'text', placeholder: '000-000-00-00' },
                    { id: 'fv_buyer', label: 'NIP Nabywcy', type: 'text', placeholder: '000-000-00-00' },
                    { id: 'fv_payment', label: 'Termin płatności (dni)', type: 'number', placeholder: '14' }
                ],
                // Pola plikowe
                uploads: [
                    { id: 'fv_logo', label: 'Logo Firmy' }
                ]
            },
            {
                id: 'tmpl_calendar_2026',
                name: 'Kalendarz Trójdzielny',
                thumbnail: 'https://via.placeholder.com/150/10b981/ffffff?text=CAL',
                preview: 'https://via.placeholder.com/400x800/1e293b/ffffff?text=PODGLAD+KALENDARZA',
                fields: [
                    { id: 'cal_year', label: 'Rok', type: 'number', placeholder: '2026' },
                    { id: 'cal_slogan', label: 'Hasło reklamowe', type: 'text', placeholder: 'Twoja reklama tutaj' },
                    { id: 'cal_footer', label: 'Tekst w stopce', type: 'text', placeholder: 'www.twojafirma.pl' }
                ],
                uploads: [
                    { id: 'cal_header_img', label: 'Główka (Zdjęcie)' },
                    { id: 'cal_logo', label: 'Logo w stopce' }
                ]
            },
            {
                id: 'tmpl_simple_note',
                name: 'Notatka Firmowa',
                thumbnail: 'https://via.placeholder.com/150/f59e0b/ffffff?text=NOTE',
                preview: 'https://via.placeholder.com/600x800/1e293b/ffffff?text=PODGLAD+NOTATKI',
                fields: [
                    { id: 'note_title', label: 'Tytuł notatki', type: 'text', placeholder: 'Tytuł...' },
                    { id: 'note_content', label: 'Treść', type: 'textarea', placeholder: 'Wpisz treść...' }
                ],
                uploads: [] // Ten szablon nie ma uploadów
            }
        ];

        // ELEMENTY DOM
        const templateListEl = document.getElementById('template-list');
        const editorAreaEl = document.getElementById('editor-area');
        const previewImgEl = document.getElementById('template-preview-img');
        const previewNameEl = document.getElementById('preview-name');
        const dynamicInputsEl = document.getElementById('dynamic-inputs');
        const dynamicUploadsEl = document.getElementById('dynamic-uploads');
        const noUploadsMsgEl = document.getElementById('no-uploads-msg');

        // INICJALIZACJA - RENDEROWANIE KART
        function init() {
            templatesData.forEach(tmpl => {
                const card = document.createElement('div');
                card.className = 'template-card bg-slate-800 border-2 border-slate-700 rounded-xl p-4 cursor-pointer hover:border-slate-500 transition-all flex flex-col items-center gap-3 group';
                card.onclick = () => selectTemplate(tmpl.id, card);
                
                card.innerHTML = `
                    <div class="w-full aspect-square bg-slate-900 rounded-lg overflow-hidden relative">
                        <img src="${tmpl.thumbnail}" alt="${tmpl.name}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                    </div>
                    <span class="font-medium text-sm text-center">${tmpl.name}</span>
                `;
                templateListEl.appendChild(card);
            });
        }

        // LOGIKA WYBORU SZABLONU
        function selectTemplate(id, cardElement) {
            // 1. Zaznacz wizualnie kartę
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('active'));
            cardElement.classList.add('active');

            // 2. Znajdź dane szablonu
            const tmpl = templatesData.find(t => t.id === id);
            if (!tmpl) return;

            // 3. Pokaż sekcję edycji
            editorAreaEl.classList.remove('hidden');
            
            // 4. Ustaw podgląd
            previewImgEl.src = tmpl.preview;
            previewNameEl.innerText = tmpl.name;

            // 5. Generuj pola tekstowe (Inputy)
            dynamicInputsEl.innerHTML = ''; // Wyczyść stare
            tmpl.fields.forEach(field => {
                const wrapper = document.createElement('div');
                wrapper.className = 'flex flex-col gap-2';
                
                let inputHtml = '';
                if (field.type === 'textarea') {
                    inputHtml = `<textarea id="${field.id}" rows="4" class="bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="${field.placeholder || ''}"></textarea>`;
                } else {
                    inputHtml = `<input type="${field.type}" id="${field.id}" class="bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="${field.placeholder || ''}" />`;
                }

                wrapper.innerHTML = `
                    <label for="${field.id}" class="text-sm font-medium text-slate-300">${field.label}</label>
                    ${inputHtml}
                `;
                dynamicInputsEl.appendChild(wrapper);
            });

            // 6. Generuj pola uploadu
            dynamicUploadsEl.innerHTML = ''; // Wyczyść stare
            
            if (tmpl.uploads.length === 0) {
                noUploadsMsgEl.classList.remove('hidden');
            } else {
                noUploadsMsgEl.classList.add('hidden');
                tmpl.uploads.forEach(upload => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'border-2 border-dashed border-slate-600 rounded-lg p-4 flex flex-col items-center justify-center gap-2 hover:bg-slate-700/30 transition-colors cursor-pointer relative';
                    
                    wrapper.innerHTML = `
                        <i class="fa-solid fa-cloud-arrow-up text-2xl text-slate-400"></i>
                        <span class="text-sm font-medium text-slate-300 text-center">${upload.label}</span>
                        <input type="file" id="${upload.id}" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                        <span class="text-xs text-slate-500 text-center filename-display">Wybierz plik...</span>
                    `;

                    // Prosta obsługa wyświetlania nazwy pliku po wyborze
                    const input = wrapper.querySelector('input');
                    const label = wrapper.querySelector('.filename-display');
                    input.addEventListener('change', (e) => {
                        if(e.target.files.length > 0) {
                            label.innerText = e.target.files[0].name;
                            label.classList.add('text-green-400');
                        }
                    });

                    dynamicUploadsEl.appendChild(wrapper);
                });
            }
            
            // Scroll do edytora (opcjonalnie)
            // editorAreaEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Start
        init();
    </script>
  </body>
</html>
