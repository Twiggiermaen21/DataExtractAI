<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR & AI Document Processor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #0a0a0a;
      --bg-card: #111111;
      --bg-hover: #1a1a1a;
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --text-muted: #555555;
      --accent-blue: #0071e3;
      --accent-green: #30d158;
      --accent-purple: #bf5af2;
      --accent-orange: #ff9f0a;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 48px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 400;
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
      transition: var(--transition);
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.12);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title .icon {
      font-size: 1.3rem;
    }

    /* Grid Layout */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    /* Upload Zone */
    .upload-zone {
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-md);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      background: linear-gradient(135deg, rgba(0, 113, 227, 0.02) 0%, rgba(191, 90, 242, 0.02) 100%);
    }

    .upload-zone:hover {
      border-color: var(--accent-blue);
      background: linear-gradient(135deg, rgba(0, 113, 227, 0.05) 0%, rgba(191, 90, 242, 0.05) 100%);
    }

    .upload-zone.dragover {
      border-color: var(--accent-blue);
      background: rgba(0, 113, 227, 0.1);
      transform: scale(1.01);
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .upload-text {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .upload-hint {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* File Input */
    #fileInput {
      display: none;
    }

    /* File List */
    .file-list {
      margin-top: 16px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      font-size: 0.9rem;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .file-item .icon {
      color: var(--accent-blue);
    }

    .file-item .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-item .size {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .file-item .remove {
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }

    .file-item .remove:hover {
      color: #ff453a;
      background: rgba(255, 69, 58, 0.1);
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: var(--accent-blue);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .btn:hover:not(:disabled) {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-green {
      background: var(--accent-green);
    }

    .btn-purple {
      background: var(--accent-purple);
    }

    .btn.loading {
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-blue));
      background-size: 200% 100%;
      animation: shimmer 2s infinite linear;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    .spinner {
      animation: spin 1s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* Progress */
    .progress-bar {
      height: 3px;
      background: var(--bg-hover);
      border-radius: 2px;
      margin-top: 16px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .status-text {
      text-align: center;
      color: var(--text-secondary);
      margin-top: 12px;
      font-size: 0.9rem;
    }

    /* Results */
    .result-item {
      padding: 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }

    .result-item .filename {
      font-weight: 500;
      color: var(--accent-blue);
      margin-bottom: 4px;
    }

    .result-item .status {
      font-size: 0.85rem;
      color: var(--accent-green);
    }

    .result-item .status.error {
      color: #ff453a;
    }

    /* Select & Inputs */
    select,
    textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      transition: var(--transition);
      outline: none;
    }

    select:focus,
    textarea:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    label {
      display: block;
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    /* Checkbox List */
    .checkbox-list {
      max-height: 200px;
      overflow-y: auto;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 8px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
    }

    .checkbox-item:hover {
      background: var(--bg-hover);
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent-blue);
    }

    .checkbox-item label {
      margin: 0;
      cursor: pointer;
      flex: 1;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    /* Template Preview */
    .template-preview {
      background: white;
      border-radius: var(--radius-md);
      margin-top: 16px;
      overflow: hidden;
      max-height: 500px;
      overflow-y: auto;
    }

    .template-preview iframe {
      width: 100%;
      height: 450px;
      border: none;
    }

    /* JSON Output */
    .json-output {
      background: var(--bg-secondary);
      padding: 16px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.85rem;
      color: var(--accent-green);
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
    }

    /* Section divider */
    .divider {
      height: 1px;
      background: var(--border-color);
      margin: 32px 0;
    }

    /* Hidden */
    .hidden {
      display: none !important;
    }

    /* Inline group */
    .inline-group {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .inline-group>* {
      flex: 1;
    }

    .inline-group .btn {
      flex: 0 0 auto;
      width: auto;
      padding: 12px 20px;
      margin-top: 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Document AI</h1>
      <p class="subtitle">OCR • Extraction • Template Filling</p>
    </header>

    <!-- OCR Section -->
    <div class="card">
      <div class="card-title"><span class="icon">📷</span> Skanowanie OCR</div>

      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">📁</div>
        <div class="upload-text">Przeciągnij pliki lub kliknij aby wybrać</div>
        <div class="upload-hint">JPG, PNG, PDF • Wiele plików naraz</div>
      </div>
      <input type="file" id="fileInput" multiple accept="image/*,.pdf">

      <div class="file-list" id="fileList"></div>

      <button class="btn" id="btnOcr" disabled>
        <span id="btnIcon">🚀</span>
        <span id="btnText">Uruchom OCR</span>
      </button>

      <div class="progress-bar hidden" id="progressBar">
        <div class="fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="status-text hidden" id="statusText"></div>
    </div>

    <!-- OCR Results -->
    <div class="card hidden" id="resultsCard">
      <div class="card-title"><span class="icon">✅</span> Wyniki OCR</div>
      <div id="resultsList"></div>
    </div>

    <div class="divider"></div>

    <!-- Template Section -->
    <div class="grid-2">
      <!-- Left: JSON Selection -->
      <div class="card">
        <div class="card-title"><span class="icon">📄</span> Wybierz pliki JSON</div>

        <div class="inline-group" style="margin-bottom: 16px;">
          <div style="flex: 1;">
            <label>Wyniki OCR do przetworzenia</label>
          </div>
          <button class="btn" id="refreshJsonList"
            style="width: auto; margin-top: 0; padding: 8px 16px; font-size: 0.85rem;">🔄 Odśwież</button>
        </div>

        <div class="checkbox-list" id="jsonCheckboxList">
          <div style="color: var(--text-muted); padding: 16px; text-align: center;">Brak plików JSON</div>
        </div>

        <div style="margin-top: 20px;">
          <label>📋 Szablon dokumentu</label>
          <select id="templateSelect">
            <option value="">-- Wybierz szablon --</option>
          </select>
        </div>

        <button class="btn btn-green" id="btnTemplate" disabled>
          <span id="btnTemplateIcon">🤖</span>
          <span id="btnTemplateText">Wypełnij szablon AI</span>
        </button>

        <div class="progress-bar hidden" id="templateProgressBar">
          <div class="fill" id="templateProgressFill" style="width: 0%"></div>
        </div>
        <div class="status-text hidden" id="templateStatusText"></div>
      </div>

      <!-- Right: Template Preview -->
      <div class="card">
        <div class="card-title"><span class="icon">👁️</span> Podgląd szablonu</div>
        <div class="template-preview" id="templatePreview">
          <div style="padding: 48px; text-align: center; color: var(--text-muted);">
            Wybierz szablon aby zobaczyć podgląd
          </div>
        </div>
      </div>
    </div>

    <!-- Extracted Data -->
    <div class="card hidden" id="extractedDataCard">
      <div class="card-title"><span class="icon">📊</span> Wyekstrahowane dane</div>
      <pre class="json-output" id="extractedDataContent"></pre>
    </div>
  </div>

  <script>
    // ==================== OCR ====================
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const btnOcr = document.getElementById('btnOcr');
    const btnIcon = document.getElementById('btnIcon');
    const btnText = document.getElementById('btnText');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const statusText = document.getElementById('statusText');
    const resultsCard = document.getElementById('resultsCard');
    const resultsList = document.getElementById('resultsList');

    let selectedFiles = [];

    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });

    function handleFiles(files) {
      for (const file of files) {
        if (!selectedFiles.find(f => f.name === file.name)) {
          selectedFiles.push(file);
        }
      }
      renderFileList();
      updateOcrButton();
    }

    function renderFileList() {
      fileList.innerHTML = selectedFiles.map((file, index) => `
        <div class="file-item">
          <span class="icon">📄</span>
          <span class="name">${file.name}</span>
          <span class="size">${formatSize(file.size)}</span>
          <span class="remove" onclick="removeFile(${index})">✕</span>
        </div>
      `).join('');
    }

    function removeFile(index) {
      selectedFiles.splice(index, 1);
      renderFileList();
      updateOcrButton();
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function updateOcrButton() {
      btnOcr.disabled = selectedFiles.length === 0;
    }

    btnOcr.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;

      btnOcr.disabled = true;
      btnOcr.classList.add('loading');
      btnIcon.innerHTML = '<span class="spinner">⏳</span>';
      btnText.textContent = 'Przetwarzanie...';
      progressBar.classList.remove('hidden');
      statusText.classList.remove('hidden');
      statusText.textContent = 'Ładowanie modelu OCR...';
      progressFill.style.width = '10%';
      resultsCard.classList.add('hidden');

      const formData = new FormData();
      selectedFiles.forEach(file => {
        formData.append('files', file);
      });

      try {
        statusText.textContent = 'Przetwarzanie obrazów...';
        progressFill.style.width = '30%';

        const response = await fetch('/api/process_ocr', {
          method: 'POST',
          body: formData
        });

        progressFill.style.width = '90%';
        const data = await response.json();
        progressFill.style.width = '100%';

        if (data.success) {
          statusText.textContent = `✅ Przetworzono ${data.processed.length} plików`;
          showResults(data);
        } else {
          statusText.textContent = `❌ ${data.error}`;
        }

      } catch (error) {
        statusText.textContent = `❌ ${error.message}`;
      } finally {
        btnOcr.classList.remove('loading');
        btnIcon.textContent = '🚀';
        btnText.textContent = 'Uruchom OCR';
        btnOcr.disabled = false;

        setTimeout(() => {
          progressBar.classList.add('hidden');
        }, 2000);
      }
    });

    function showResults(data) {
      resultsCard.classList.remove('hidden');

      let html = '';
      data.processed.forEach(filename => {
        html += `
          <div class="result-item">
            <div class="filename">📄 ${filename}</div>
            <div class="status">✓ JSON zapisany w /output</div>
          </div>
        `;
      });

      data.errors.forEach(err => {
        html += `
          <div class="result-item">
            <div class="filename">📄 ${err.file}</div>
            <div class="status error">✕ ${err.error}</div>
          </div>
        `;
      });

      resultsList.innerHTML = html;
      selectedFiles = [];
      renderFileList();
      updateOcrButton();
      loadJsonFiles();
    }

    // ==================== Templates ====================
    const jsonCheckboxList = document.getElementById('jsonCheckboxList');
    const refreshJsonList = document.getElementById('refreshJsonList');
    const templateSelect = document.getElementById('templateSelect');
    const btnTemplate = document.getElementById('btnTemplate');
    const btnTemplateIcon = document.getElementById('btnTemplateIcon');
    const btnTemplateText = document.getElementById('btnTemplateText');
    const templateProgressBar = document.getElementById('templateProgressBar');
    const templateProgressFill = document.getElementById('templateProgressFill');
    const templateStatusText = document.getElementById('templateStatusText');
    const templatePreview = document.getElementById('templatePreview');
    const extractedDataCard = document.getElementById('extractedDataCard');
    const extractedDataContent = document.getElementById('extractedDataContent');

    let currentTemplateFields = [];
    let templateIframe = null;

    async function loadJsonFiles() {
      try {
        const response = await fetch('/api/ocr_results');
        const files = await response.json();

        if (files.length === 0) {
          jsonCheckboxList.innerHTML = '<div style="color: var(--text-muted); padding: 16px; text-align: center;">Brak plików JSON</div>';
        } else {
          jsonCheckboxList.innerHTML = files.map(file => `
            <div class="checkbox-item">
              <input type="checkbox" id="json_${file}" value="${file}">
              <label for="json_${file}">${file}</label>
            </div>
          `).join('');
        }
        updateTemplateButton();
      } catch (e) {
        console.error('Error loading JSON files:', e);
      }
    }

    async function loadTemplates() {
      try {
        const response = await fetch('/api/templates');
        const templates = await response.json();

        templateSelect.innerHTML = '<option value="">-- Wybierz szablon --</option>';
        templates.forEach(t => {
          templateSelect.innerHTML += `<option value="${t.filename}">${t.name}</option>`;
        });
      } catch (e) {
        console.error('Error loading templates:', e);
      }
    }

    loadJsonFiles();
    loadTemplates();

    refreshJsonList.addEventListener('click', loadJsonFiles);

    jsonCheckboxList.addEventListener('change', updateTemplateButton);
    templateSelect.addEventListener('change', async () => {
      updateTemplateButton();

      const filename = templateSelect.value;
      if (!filename) {
        templatePreview.innerHTML = '<div style="padding: 48px; text-align: center; color: var(--text-muted);">Wybierz szablon aby zobaczyć podgląd</div>';
        currentTemplateFields = [];
        return;
      }

      try {
        const response = await fetch(`/api/template/${filename}`);
        const data = await response.json();

        currentTemplateFields = data.fields;

        // Create iframe for preview
        templatePreview.innerHTML = '';
        templateIframe = document.createElement('iframe');
        templateIframe.style.width = '100%';
        templateIframe.style.height = '450px';
        templateIframe.style.border = 'none';
        templatePreview.appendChild(templateIframe);

        templateIframe.contentDocument.open();
        templateIframe.contentDocument.write(data.content);
        templateIframe.contentDocument.close();

      } catch (e) {
        templatePreview.innerHTML = '<div style="padding: 48px; text-align: center; color: #ff453a;">Błąd ładowania szablonu</div>';
      }
    });

    function getSelectedJsonFiles() {
      const checkboxes = jsonCheckboxList.querySelectorAll('input[type="checkbox"]:checked');
      return Array.from(checkboxes).map(cb => cb.value);
    }

    function updateTemplateButton() {
      const selectedFiles = getSelectedJsonFiles();
      const hasTemplate = templateSelect.value !== '';
      btnTemplate.disabled = selectedFiles.length === 0 || !hasTemplate;
    }

    btnTemplate.addEventListener('click', async () => {
      const selectedFiles = getSelectedJsonFiles();
      const templateFilename = templateSelect.value;

      if (selectedFiles.length === 0 || !templateFilename) return;

      btnTemplate.disabled = true;
      btnTemplate.classList.add('loading');
      btnTemplateIcon.innerHTML = '<span class="spinner">⏳</span>';
      btnTemplateText.textContent = 'Przetwarzanie...';
      templateProgressBar.classList.remove('hidden');
      templateStatusText.classList.remove('hidden');
      templateStatusText.textContent = 'Wysyłanie do AI...';
      templateProgressFill.style.width = '20%';
      extractedDataCard.classList.add('hidden');

      try {
        templateStatusText.textContent = 'Ekstrakcja danych...';
        templateProgressFill.style.width = '50%';

        const response = await fetch('/api/process_template', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            files: selectedFiles,
            fields: currentTemplateFields
          })
        });

        templateProgressFill.style.width = '90%';
        const data = await response.json();
        templateProgressFill.style.width = '100%';

        if (data.success) {
          templateStatusText.textContent = '✅ Ekstrakcja zakończona!';

          // Show extracted data
          extractedDataCard.classList.remove('hidden');
          extractedDataContent.textContent = JSON.stringify(data.fields, null, 2);

          // Fill template inputs
          if (templateIframe && templateIframe.contentDocument) {
            const doc = templateIframe.contentDocument;
            for (const [fieldName, value] of Object.entries(data.fields)) {
              const input = doc.querySelector(`input[name="${fieldName}"]`);
              if (input && value) {
                input.value = value;
                input.style.background = '#e8f5e9';
              }
            }
          }
        } else {
          templateStatusText.textContent = `❌ ${data.error}`;
        }

      } catch (error) {
        templateStatusText.textContent = `❌ ${error.message}`;
      } finally {
        btnTemplate.classList.remove('loading');
        btnTemplateIcon.textContent = '🤖';
        btnTemplateText.textContent = 'Wypełnij szablon AI';
        updateTemplateButton();

        setTimeout(() => {
          templateProgressBar.classList.add('hidden');
        }, 2000);
      }
    });
  </script>
</body>

</html>
