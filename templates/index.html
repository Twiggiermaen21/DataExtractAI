<!DOCTYPE html>
<html lang="pl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Invoice Manager - Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/docx-preview/dist/docx-preview.min.js"></script>

    <style>
      .fade-in { animation: fadeIn 0.5s ease-in-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .template-card.active { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); background-color: #1e293b; }
      .docx-wrapper { background: #5e6470; padding: 20px; overflow-y: auto; overflow-x: hidden; height: 600px; display: flex; flex-direction: column; align-items: center; }
      .magic-border { background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, rgba(147, 51, 234, 0.1) 50%, rgba(59, 130, 246, 0.1) 100%); background-size: 200% 100%; animation: gradientMove 3s linear infinite; }
      @keyframes gradientMove { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
      .docx-wrapper section.docx-render { margin-bottom: 20px !important; }
    </style>
  </head>
  <body class="p-6 md:p-10 min-h-screen bg-slate-900 text-slate-200 font-sans">
    <div class="max-w-7xl mx-auto">
      <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-5">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">AI</div>
          <h1 class="text-2xl font-bold text-white">Generator Dokumentów</h1>
        </div>
      </header>

      <section id="step-1" class="mb-10">
        <h2 class="text-xs font-semibold text-slate-400 mb-4 uppercase tracking-wider">1. Wybierz szablon z folderu /docs</h2>
        <div id="template-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
      </section>

      <div id="editor-area" class="hidden fade-in grid grid-cols-1 lg:grid-cols-12 gap-8">
        <section id="step-2" class="lg:col-span-7 order-2 lg:order-1">
          <div class="sticky top-5">
            <h2 class="text-xs font-semibold text-slate-400 mb-4 uppercase tracking-wider flex items-center gap-2">
              <i class="fa-solid fa-file-word"></i> Podgląd Pliku DOCX
            </h2>
            <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-xl overflow-hidden relative">
              <div id="loading-spinner" class="hidden absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center z-20">
                <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-500 mb-3"></i>
                <span class="text-sm font-medium animate-pulse">Renderowanie podglądu...</span>
              </div>
              <div id="docx-container" class="docx-wrapper custom-scrollbar"></div>
            </div>
          </div>
        </section>

        <section class="lg:col-span-5 order-1 lg:order-2 space-y-6">
          <div class="bg-slate-800/80 rounded-xl border border-blue-500/30 shadow-lg overflow-hidden magic-border backdrop-blur-sm">
            <div class="p-5">
              <h2 class="text-xs font-bold text-blue-400 uppercase tracking-wider flex items-center gap-2 mb-3">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Inteligentne Autouzupełnianie
              </h2>
              <p class="text-xs text-slate-400 mb-4">Wrzuć skan faktury/dokumentu, a system automatycznie wypełni pola.</p>
              <label for="autofill-upload" class="flex items-center justify-center w-full p-4 border-2 border-dashed border-blue-500/40 rounded-lg cursor-pointer bg-blue-500/10 hover:bg-blue-500/20 transition-all group">
                <div id="autofill-content" class="flex flex-row items-center gap-3">
                  <i class="fa-solid fa-bolt text-xl text-blue-400 group-hover:scale-110 transition-transform"></i>
                  <span class="text-sm font-medium text-blue-100">Wybierz plik źródłowy (OCR)</span>
                </div>
                <div id="autofill-loading" class="hidden flex flex-row items-center gap-3">
                  <i class="fa-solid fa-circle-notch fa-spin text-blue-400"></i>
                  <span class="text-sm text-blue-200">Analizowanie danych...</span>
                </div>
                <input id="autofill-upload" type="file" class="hidden" accept="image/*,.pdf" />
              </label>
            </div>
          </div>

          <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-lg overflow-hidden">
            <div class="bg-slate-800/50 p-4 border-b border-slate-700">
              <h2 class="text-xs font-bold text-slate-300 uppercase tracking-wider flex items-center gap-2">
                <i class="fa-solid fa-pen-to-square text-blue-500"></i> Dane Dokumentu
              </h2>
            </div>
            <div class="p-5">
              <div id="dynamic-inputs" class="grid grid-cols-1 gap-4"></div>
            </div>
          </div>

          <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-lg overflow-hidden">
            <div class="bg-slate-800/50 p-4 border-b border-slate-700">
              <h2 class="text-xs font-bold text-slate-300 uppercase tracking-wider flex items-center gap-2">
                <i class="fa-solid fa-paperclip text-green-500"></i> Załączniki
              </h2>
            </div>
            <div class="p-5">
              <div id="no-uploads-msg" class="hidden text-slate-500 italic text-sm text-center py-4">Ten szablon nie wymaga załączników.</div>
              <div id="dynamic-uploads" class="space-y-4"></div>
            </div>
          </div>

          <button class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-blue-500/20 transition-all flex items-center justify-center gap-2 mt-4 transform active:scale-95">
            <i class="fa-solid fa-file-export"></i> Generuj Dokument
          </button>
        </section>
      </div>
    </div>

    <script>
      // KONFIGURACJA SZABLONÓW
      const templatesData = [
        {
          id: "tmpl_invoice",
          name: "Wezwania do zapłaty",
          filename: "wezwania do zapłaty.docx",
          fields: [
            { id: "doc_place_date", label: "Miejscowość i Data", type: "text", placeholder: "np. Tychy, 13.01.2026 r." },
            { id: "creditor_name", label: "Nazwa Wierzyciela", type: "text", placeholder: "np. Orlen Spółka Akcyjna" },
            { id: "creditor_address", label: "Adres Wierzyciela", type: "text", placeholder: "ulica, kod, miasto" },
            { id: "creditor_krs", label: "KRS Wierzyciela", type: "text" },
            { id: "creditor_nip", label: "NIP Wierzyciela", type: "text" },
            { id: "creditor_capital", label: "Kapitał Zakładowy", type: "text", placeholder: "np. 1 451 177 561,25 zł" },
            { id: "creditor_court", label: "Sąd Rejestrowy", type: "text", placeholder: "np. Sąd Rejonowy w Płocku..." },
            { id: "debtor_name", label: "Nazwa Dłużnika", type: "text", placeholder: "np. CD Projekt S.A." },
            { id: "debtor_address", label: "Adres Dłużnika", type: "text" },
            { id: "fv_nr", label: "Numer Faktury", type: "text" },
            { id: "fv_date", label: "Data wystawienia faktury", type: "date" },
            { id: "debt_amount", label: "Kwota do zapłaty (PLN)", type: "number", placeholder: "2350.00" },
            { id: "interest_date", label: "Data naliczania odsetek (od dnia)", type: "date" },
            { id: "bank_account", label: "Nr Konta", type: "text" },
            { id: "bank_name", label: "Nazwa Banku", type: "text" },
          ],
          uploads: [
            { id: "adresat", label: "KRS-ADRESAT", multiple: false },
            { id: "nadawca", label: "KRS-NADAWCA", multiple: false },
            { id: "factura", label: "FACTURA", multiple: true },
          ],
        },
        {
          id: "tmpl_calendar",
          name: "Kalendarz 2026",
          filename: "Kalendarz_Trojdzielny.docx",
          fields: [
            { id: "cal_year", label: "Rok", type: "number" },
            { id: "cal_txt", label: "Tekst reklamowy", type: "text" },
          ],
          uploads: [
            { id: "cal_img", label: "Zdjęcie główne", multiple: false },
          ],
        },
      ];

      const templateListEl = document.getElementById("template-list");
      const editorAreaEl = document.getElementById("editor-area");
      const docxContainerEl = document.getElementById("docx-container");
      const loadingSpinner = document.getElementById("loading-spinner");
      const dynamicInputsEl = document.getElementById("dynamic-inputs");
      const dynamicUploadsEl = document.getElementById("dynamic-uploads");

      const autofillInput = document.getElementById("autofill-upload");
      const autofillContent = document.getElementById("autofill-content");
      const autofillLoading = document.getElementById("autofill-loading");

      // --- AUTOUZUPEŁNIANIE ---
      autofillInput.addEventListener("change", async (e) => {
        if (e.target.files.length === 0) return;
        const file = e.target.files[0];

        autofillContent.classList.add("hidden");
        autofillLoading.classList.remove("hidden");

        const formData = new FormData();
        formData.append('file', file);

        try {
            // WYWOŁANIE API BACKENDU
            // Upewnij się, że '/ocr' to poprawny prefix Twojego blueprinta. 
            // Jeśli nie używasz url_prefix='/ocr', usuń to.
            const response = await fetch('/api/extract_data', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error || "Błąd serwera");
            }

            const data = await response.json();
            fillFormFields(data);
            
            // Mały efekt sukcesu na przycisku
            autofillLoading.innerHTML = '<i class="fa-solid fa-check text-green-400"></i> <span class="text-green-200">Gotowe!</span>';
            setTimeout(() => {
                autofillContent.classList.remove("hidden");
                autofillLoading.classList.add("hidden");
                autofillLoading.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-blue-400"></i><span class="text-sm text-blue-200">Analizowanie danych...</span>';
            }, 2000);

        } catch (error) {
            console.error("Błąd:", error);
            alert("Błąd analizy: " + error.message);
            autofillContent.classList.remove("hidden");
            autofillLoading.classList.add("hidden");
        } finally {
            autofillInput.value = "";
        }
      });

      function fillFormFields(data) {
        let filledCount = 0;
        for (const [key, value] of Object.entries(data)) {
          const inputEl = document.getElementById(key);
          if (inputEl && value) {
            inputEl.value = value;
            inputEl.classList.add('bg-blue-900/40', 'border-blue-500');
            setTimeout(() => inputEl.classList.remove('bg-blue-900/40', 'border-blue-500'), 1500);
            filledCount++;
          }
        }
        if(filledCount === 0) alert("Nie udało się dopasować żadnych danych do tego szablonu.");
      }

      // --- RESZTA FUNKCJI (DOCX, RENDEROWANIE) ---
      function autoScaleDocx() {
        setTimeout(() => {
          const wrapper = docxContainerEl;
          const pages = wrapper.querySelectorAll(".docx-render");
          if (pages.length === 0) return;
          const pageWidth = pages[0].offsetWidth;
          const containerWidth = wrapper.clientWidth - 40;
          let scale = containerWidth / pageWidth;
          if (scale > 1) scale = 1;
          pages.forEach((page) => {
            page.style.transform = `scale(${scale})`;
            page.style.transformOrigin = "top center";
            page.style.marginBottom = `-${page.offsetHeight * (1 - scale) - 20}px`;
          });
        }, 100);
      }

      window.addEventListener("resize", autoScaleDocx);

      function init() {
        templatesData.forEach((tmpl) => {
          const card = document.createElement("div");
          card.className = "template-card bg-slate-800 border-2 border-slate-700 rounded-xl p-4 cursor-pointer hover:border-slate-500 transition-all flex flex-col items-center gap-3 group";
          card.onclick = () => selectTemplate(tmpl, card);
          card.innerHTML = `
                <div class="w-full aspect-video bg-slate-900 rounded border border-slate-700 flex items-center justify-center text-slate-500">
                    <i class="fa-solid fa-file-word text-3xl group-hover:text-blue-500 transition-colors"></i>
                </div>
                <span class="font-medium text-sm text-center group-hover:text-white transition-colors">${tmpl.name}</span>
            `;
          templateListEl.appendChild(card);
        });
      }

      async function selectTemplate(tmpl, cardElement) {
        document.querySelectorAll(".template-card").forEach((c) => c.classList.remove("active"));
        cardElement.classList.add("active");
        editorAreaEl.classList.remove("hidden");

        // Inputy
        dynamicInputsEl.innerHTML = "";
        tmpl.fields.forEach((f) => {
          dynamicInputsEl.innerHTML += `
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wide">${f.label}</label>
                <input id="${f.id}" type="${f.type}" placeholder="${f.placeholder || ''}" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-sm text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder-slate-600">
            </div>`;
        });

        // Uploads
        dynamicUploadsEl.innerHTML = "";
        if (tmpl.uploads.length === 0)
          document.getElementById("no-uploads-msg").classList.remove("hidden");
        else {
          document.getElementById("no-uploads-msg").classList.add("hidden");
          tmpl.uploads.forEach((u) => {
            const inputId = `file-${u.id}`;
            const listId = `list-${u.id}`;
            const isMultiple = u.multiple ? "multiple" : "";
            const multipleLabel = u.multiple ? "(Możesz wybrać wiele)" : "(Tylko jeden plik)";

            const wrapper = document.createElement("div");
            wrapper.className = "group";
            wrapper.innerHTML = `
                    <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wide">${u.label} <span class="text-[10px] opacity-60 normal-case">${multipleLabel}</span></label>
                    <label for="${inputId}" class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-slate-600 rounded-lg cursor-pointer bg-slate-800/30 hover:bg-slate-700/50 hover:border-blue-500 transition-all">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <i class="fa-solid fa-cloud-arrow-up text-2xl text-slate-400 mb-2 group-hover:text-blue-400 transition-colors"></i>
                            <p class="text-xs text-slate-400">Kliknij aby wybrać pliki</p>
                        </div>
                        <input id="${inputId}" type="file" class="hidden" ${isMultiple} />
                    </label>
                    <ul id="${listId}" class="mt-2 space-y-1"></ul>
                `;
            dynamicUploadsEl.appendChild(wrapper);

            const input = wrapper.querySelector(`#${inputId}`);
            const list = wrapper.querySelector(`#${listId}`);
            input.addEventListener("change", (e) => {
              list.innerHTML = "";
              if (e.target.files.length > 0) {
                Array.from(e.target.files).forEach((file) => {
                  list.innerHTML += `
                        <li class="flex items-center gap-2 text-xs text-slate-300 bg-slate-700/50 px-2 py-1 rounded border border-slate-600">
                            <i class="fa-regular fa-file text-blue-400"></i>
                            <span class="truncate">${file.name}</span>
                            <span class="text-slate-500 ml-auto">${(file.size / 1024).toFixed(1)} KB</span>
                        </li>`;
                });
              }
            });
          });
        }

        // Render DOCX
        loadingSpinner.classList.remove("hidden");
        docxContainerEl.innerHTML = "";
        try {
          const response = await fetch(`/get-template/${tmpl.filename}`);
          if (!response.ok) throw new Error(`Błąd pobierania: ${response.statusText}`);
          const blob = await response.blob();
          const renderOptions = { className: "docx-render", inWrapper: false, ignoreWidth: false, experimental: true };
          await docx.renderAsync(blob, docxContainerEl, null, renderOptions);
          autoScaleDocx();
        } catch (error) {
          docxContainerEl.innerHTML = `<div class="text-red-400 text-center p-10">${error.message}</div>`;
        } finally {
          loadingSpinner.classList.add("hidden");
        }
      }

      init();
    </script>
  </body>
</html>
