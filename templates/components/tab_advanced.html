<div id="tab-advanced" class="modern-container">
    <div class="actions-column panel-flex">
        <!-- SECTION 1: Importuj dane -->
        <div class="card-modern card-dark" style="animation-delay: 0.1s; border: 1px solid var(--accent-emerald-soft);">
            <h3 class="modern-title">
                <span
                    style="width: 8px; height: 24px; background: var(--accent-emerald); border-radius: 4px; display: inline-block;"></span>
                Importuj dane
            </h3>

            <!-- Typ dokumentu (hidden) -->
            <div class="step-section hidden" style="display: none;">
                <select id="templateSelect" class="btn-modern btn-dark-modern">
                    <option value="">-- Wybierz szablon --</option>
                </select>
            </div>

            <div class="step-section hidden" id="advStepUpload">
                <div class="upload-zone-modern" id="advUploadZone">
                    <div class="upload-icon-box">📄</div>
                    <div class="upload-text" style="color: var(--text-bright); font-weight: 600;">Dodaj pliki faktur
                    </div>
                    <div class="modern-subtitle" style="margin-bottom: 0;">Przeciągnij lub kliknij (JPG, PNG, PDF, XML)
                    </div>
                </div>
                <input type="file" id="advFileInput" multiple accept="image/*,.pdf,.xml" style="display:none;">
                <div class="file-list" id="advFileList" style="margin-top: 16px;"></div>

                <!-- Analiza przeniesiona do panelu Akcje na dole -->
            </div>
        </div>

        <!-- SECTION: Dane do odczytu -->
        <div class="card-modern card-dark hidden" id="podsumowanieSettings">
            <h3 class="modern-title">Dane do odczytu</h3>

            <!-- Switch: pokaż kolumny netto -->
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 8px 10px; background: rgba(0,0,0,0.2); border-radius: 10px;">
                <span style="font-size: 0.75rem; color: var(--text-dim);">Pokaż kolumny netto</span>
                <label style="position: relative; display: inline-block; width: 36px; height: 20px; cursor: pointer;">
                    <input type="checkbox" id="nettoSwitch" checked style="opacity:0; width:0; height:0; position:absolute;">
                    <span style="position:absolute; inset:0; background:var(--accent-emerald); border-radius:20px; transition:.25s;">
                        <span style="position:absolute; left:3px; top:3px; width:14px; height:14px; background:#fff; border-radius:50%; transition:.25s; transform: translateX(0);" id="nettoSwitchThumb"></span>
                    </span>
                </label>
            </div>

            <div id="columnToggleList">
                <!-- Grupa: Dane podstawowe -->
                <div style="margin-bottom: 14px;">
                    <div style="font-size: 0.65rem; color: var(--accent-emerald); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; opacity: 0.8;">Dane podstawowe</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
                        <label class="checkbox-item">
                            <input type="checkbox" checked data-columns="numer_faktury">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Nr faktury</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" checked data-columns="sprzedawca">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Sprzedawca</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" checked data-columns="data_wystawienia">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Data wystawienia</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" checked data-columns="data_sprzedazy">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Data sprzedaży</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" checked data-columns="wolumen_energii">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Wolumen energii</span>
                        </label>
                    </div>
                </div>

                <!-- Grupa: Kwoty (scalone: należność + kwoty główne + sprzedaż + dystrybucja) -->
                <div style="margin-bottom: 14px;">
                    <div style="font-size: 0.65rem; color: var(--accent-emerald); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; opacity: 0.8;">Kwoty</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
                        <label class="checkbox-item">
                            <input type="checkbox" data-columns="kwota_vat">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Kwota VAT</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" data-columns="sprzedaz_cena_netto,sprzedaz_cena_brutto">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Sprzedaż energii</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" data-columns="dystrybucja_cena_netto,dystrybucja_cena_brutto">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Dystrybucja</span>
                        </label>
                    </div>
                </div>

                <!-- Grupa: Opłaty dodatkowe -->
                <div style="margin-bottom: 8px;">
                    <div style="font-size: 0.65rem; color: var(--accent-emerald); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; opacity: 0.8;">Opłaty dodatkowe</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
                        <label class="checkbox-item">
                            <input type="checkbox" data-columns="oplata_abonamentowa,oplata_abonamentowa_brutto">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Abonamentowa</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" data-columns="oplata_sieciowa_stala,oplata_sieciowa_stala_brutto">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Sieciowa stała</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" data-columns="oplata_sieciowa_zmienna,oplata_sieciowa_zmienna_brutto">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Sieciowa zmienna</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" data-columns="oplata_jakosciowa,oplata_jakosciowa_brutto">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Jakościowa</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" data-columns="oplata_oze,oplata_oze_brutto">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Opłata OZE</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" data-columns="oplata_kogeneracyjna,oplata_kogeneracyjna_brutto">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Kogeneracyjna</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" data-columns="oplata_przejsciowa,oplata_przejsciowa_brutto">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Przejściowa</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" data-columns="oplata_mocowa,oplata_mocowa_brutto">
                            <span class="checkbox-label" style="font-size: 0.75rem;">Mocowa</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- SECTION: Akcje dokumentu -->
        <div class="card-modern card-dark hidden" id="advActionsCard"
            style="margin-top: auto; margin-bottom: 40px; border-top: 1px solid var(--border-soft);">
            <h3 class="modern-title">Akcje</h3>

            <!-- Analiza UI: Rozpocznij analizę + Progress -->
            <div id="analysis-actions" style="margin-bottom: 20px;">
                <button class="btn-modern btn-emerald" id="btnOcrFill" disabled style="width: 100%;">
                    <span id="btnOcrFillIcon">🚀</span>
                    <span id="btnOcrFillText">Rozpocznij analizę</span>
                </button>

                <div class="progress-bar hidden" id="ocrFillProgressBar" style="margin-top: 16px;">
                    <div class="fill" id="ocrFillProgressFill" style="width: 0%"></div>
                </div>
                <div id="ocrFillProgressText" class="status-text hidden"
                    style="border-radius: 30px; margin-top: 8px; font-size: 0.8rem; color: var(--accent-emerald); font-weight: 600; text-align: center;">
                    0/0</div>
            </div>

            <div class="document-actions" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
                <button class="btn-modern btn-gray-modern" id="advBtnSaveToLibrary" disabled>
                    <span>Zapisz</span>
                </button>
                <button class="btn-modern btn-dark-modern" id="btnPrintTemplate"
                    style="background: var(--accent-emerald)" disabled>
                    <span>Drukuj</span>
                </button>
                <button class="btn-modern btn-gray-modern" id="btnExportExcel" disabled>
                    <span>Excel</span>
                </button>
            </div>
        </div>
    </div>

    <!-- RIGHT PANEL: Podgląd -->
    <div class="preview-column">
        <div class="card-modern card-light hidden" id="advPreviewCard"
            style="padding: 0; overflow: hidden; display: flex; flex-direction: column; height: calc(100vh - 180px); border: none;">
            <div id="templatePreview"
                style="flex: 1; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fff;">
                <div style="padding: 48px; text-align: center;">
                    <div class="upload-icon-box"
                        style="background: #f4f4f5; color: #a1a1aa; width: 80px; height: 80px; border-radius: 20px;">📄
                    </div>
                    <p style="color: #71717a; font-weight: 500;">Wybierz szablon aby zobaczyć podgląd</p>
                </div>
            </div>
        </div>
    </div>
</div>
