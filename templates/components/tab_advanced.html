<div id="tab-advanced" class="tab-content">
    <!-- OCR Section -->
    <div class="card">
        <div class="card-title"><span class="icon">📷</span> Skanowanie OCR</div>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Przeciągnij pliki lub kliknij aby wybrać</div>
            <div class="upload-hint">JPG, PNG, PDF • Wiele plików naraz</div>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*,.pdf">

        <div class="file-list" id="fileList"></div>

        <button class="btn" id="btnOcr" disabled>
            <span id="btnIcon">🚀</span>
            <span id="btnText">Uruchom OCR</span>
        </button>

        <div class="progress-bar hidden" id="progressBar">
            <div class="fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="status-text hidden" id="statusText"></div>
    </div>

    <!-- OCR Results -->
    <div class="card hidden" id="resultsCard">
        <div class="card-title"><span class="icon">✅</span> Wyniki OCR</div>
        <div id="resultsList"></div>
    </div>

    <div class="divider"></div>

    <!-- Template Section - Nowy układ: elementy wyboru na górze, podgląd pod spodem -->
    <div class="card">
        <div class="card-title"><span class="icon">📄</span> Wypełnij szablon danymi z OCR</div>

        <div class="grid-2" style="margin-bottom: 20px;">
            <!-- Left: JSON Selection -->
            <div>
                <div class="inline-group" style="margin-bottom: 16px;">
                    <div style="flex: 1;">
                        <label>Wyniki OCR do przetworzenia</label>
                    </div>
                    <button class="btn" id="refreshJsonList"
                        style="width: auto; margin-top: 0; padding: 8px 16px; font-size: 0.85rem;">🔄 Odśwież</button>
                </div>

                <div class="checkbox-list" id="jsonCheckboxList">
                    <div style="color: var(--text-muted); padding: 16px; text-align: center;">Brak plików JSON</div>
                </div>
            </div>

            <!-- Right: Template Selection -->
            <div>
                <label>📋 Szablon dokumentu</label>
                <select id="templateSelect">
                    <option value="">-- Wybierz szablon --</option>
                </select>
            </div>
        </div>

        <button class="btn btn-green" id="btnTemplate" disabled>
            <span id="btnTemplateIcon">🤖</span>
            <span id="btnTemplateText">Wypełnij szablon AI</span>
        </button>

        <div class="progress-bar hidden" id="templateProgressBar">
            <div class="fill" id="templateProgressFill" style="width: 0%"></div>
        </div>
        <div class="status-text hidden" id="templateStatusText"></div>
    </div>

    <!-- Template Preview - Pod elementami wyboru -->
    <div class="card">
        <div class="card-title"><span class="icon">👁️</span> Podgląd szablonu</div>
        <div class="template-preview" id="templatePreview">
            <div style="padding: 48px; text-align: center; color: black;">
                Wybierz szablon aby zobaczyć podgląd
            </div>
        </div>
    </div>

    <!-- Extracted Data -->
    <div class="card hidden" id="extractedDataCard">
        <div class="card-title"><span class="icon">📊</span> Wyekstrahowane dane</div>
        <pre class="json-output" id="extractedDataContent"></pre>
    </div>
</div>
