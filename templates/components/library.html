<div class="card">
  <div class="card-title">
    Biblioteka dokumentów
  </div>

  <!-- Library Tabs -->
  <div class="library-tabs"
    style="display: flex; gap: 24px; border-bottom: 1px solid var(--border-color); margin-bottom: 24px; padding-bottom: 8px; align-items: center;">
    <div style="display: flex; gap: 24px;">
      <div class="lib-tab active" data-category="all"
        style="cursor: pointer; font-weight: 500; font-family: 'Outfit', sans-serif; position: relative; padding: 4px 8px;">
        Wszystkie</div>
      <div class="lib-tab" data-category="input"
        style="cursor: pointer; font-weight: 500; font-family: 'Outfit', sans-serif; position: relative; padding: 4px 8px;">
        Faktury (Źródła)</div>
      <div class="lib-tab" data-category="saved"
        style="cursor: pointer; font-weight: 500; font-family: 'Outfit', sans-serif; position: relative; padding: 4px 8px;">
        Zapisane dokumenty</div>
    </div>

    <div class="header-search"
      style="flex: 1; max-width: 650px; margin: 0 20px; box-shadow: none; background: rgba(255,255,255,0.03);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="global-search" placeholder="Szukaj w bibliotece...">
    </div>

    <div style="flex: 0 1 auto; margin-left: auto;"></div>

    <!-- Selection Controls (visible in selection mode) -->
    <div id="library-selection-controls" style="display: none; align-items: center; gap: 16px;">
      <div style="display: flex; align-items: center; gap: 8px; cursor: pointer;"
        onclick="document.getElementById('lib-select-all').click()">
        <input type="checkbox" id="lib-select-all"
          style="width: 16px; height: 16px; accent-color: var(--accent-purple); cursor: pointer;">
        <span style="font-size: 0.9rem; font-weight: 500;">Zaznacz wszystkie</span>
      </div>
      <button class="btn btn-sm" onclick="deleteSelected()" id="lib-delete-btn"
        style="width: auto; margin: 0; background: #ff453a; box-shadow: none; display: none;">
        Usuń (<span id="lib-selected-count">0</span>)
      </button>
    </div>

    <div id="lib-toggle-trash" class="lib-control" onclick="toggleSelectionMode()" title="Zarządzaj plikami"
      style="cursor: pointer; padding: 8px; border-radius: 50%; transition: var(--transition); display: flex; align-items: center; justify-content: center; color: var(--text-muted);">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="20" height="20">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    </div>
  </div>

  <div id="library-grid" class="library-grid">
    <!-- Dokumenty będą tu ładowane dynamicznie -->
    <div style="padding: 40px; text-align: center; color: var(--text-muted);">Ładowanie biblioteki...</div>
  </div>
</div>
