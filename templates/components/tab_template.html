<div id="drop-zone-template" class="bg-slate-800 p-10 rounded-2xl border-2 border-dashed border-slate-700 text-center shadow-2xl mb-10 relative overflow-hidden group transition-colors duration-300">
    
    <div id="loading-overlay-template" class="absolute inset-0 bg-slate-800/90 hidden flex-col items-center justify-center z-10">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500 mb-4"></div>
        <p class="text-indigo-400 font-semibold animate-pulse">Wgrywanie szablonu...</p>
    </div>

    <div class="w-20 h-20 bg-indigo-900/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-indigo-500/30 group-hover:scale-110 transition-transform duration-300 pointer-events-none">
        <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
    </div>
    
    <h2 class="text-2xl font-bold mb-2 text-white pointer-events-none">Wgraj Szablon</h2>
    <p class="text-slate-400 mb-8 max-w-md mx-auto text-sm pointer-events-none">Obsługiwane formaty: .docx (Word), .pdf. Przeciągnij i upuść tutaj.</p>
    
    <form id="uploadFormTemplate">
        <input type="file" name="file" id="template-upload" class="hidden" multiple accept=".docx,.pdf" onchange="handleTemplates(this.files)">
        <button type="button" onclick="document.getElementById('template-upload').click()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-10 py-3 rounded-xl transition-all font-semibold shadow-[0_0_20px_rgba(79,70,229,0.3)] hover:shadow-[0_0_30px_rgba(79,70,229,0.5)]">
            Wybierz pliki
        </button>
    </form>
</div>

<div class="bg-slate-800/50 rounded-2xl border border-slate-700 overflow-hidden">
    <div class="p-5 border-b border-slate-700 bg-slate-800 flex justify-between items-center">
        <h3 class="font-bold text-lg text-slate-200 flex items-center gap-2">
            <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            Biblioteka Szablonów
        </h3>
        <span class="text-xs text-slate-500 uppercase tracking-wider font-bold">Dostępne pliki</span>
    </div>
    
    <div id="templates-list-container">
        <div class="p-8 text-center text-slate-500 italic">Ładowanie biblioteki...</div>
    </div>
</div>
