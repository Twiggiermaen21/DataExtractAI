<div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">

    <div class="lg:col-span-2 space-y-6">
        
        <div id="drop-zone-template" class="bg-slate-800 p-8 rounded-2xl border-2 border-dashed border-slate-700 text-center relative overflow-hidden group transition-all hover:border-indigo-500/50">
            <input type="file" id="file-upload-template" class="hidden" accept=".docx" onchange="processTemplateFile(this.files[0])">
            
            <div class="w-16 h-16 bg-indigo-900/30 rounded-full flex items-center justify-center mx-auto mb-4 pointer-events-none">
                <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </div>
            <h2 class="text-xl font-bold text-white mb-1">Wgraj Szablon DOCX</h2>
            <p class="text-slate-400 text-sm mb-4">Przeciągnij plik tutaj</p>
            <button onclick="document.getElementById('file-upload-template').click()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-lg shadow-indigo-500/20">
                Wybierz plik
            </button>
        </div>

        <div class="bg-slate-700/50 p-4 rounded-2xl border border-slate-600 overflow-auto flex justify-center bg-slate-800">
            <div id="document-preview" 
                 class="bg-white text-black shadow-2xl p-[2.5cm] min-h-[29.7cm] w-[21cm] outline-none cursor-text"
                 contenteditable="true" 
                 spellcheck="false">
                
                <div id="placeholder-text" class="h-full flex flex-col items-center justify-center text-slate-300 pointer-events-none select-none mt-20">
                    <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <p class="italic">Tutaj pojawi się treść dokumentu...</p>
                </div>

            </div>
        </div>
        
        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center">
            <div class="flex-1 mr-4">
                <label class="block text-xs text-slate-400 mb-1">Nazwa szablonu:</label>
                <input type="text" id="template-name" placeholder="np. Umowa_Wspolpracy" class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white focus:border-indigo-500 focus:outline-none">
            </div>
            <button onclick="saveTemplate()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 h-10 mt-5 rounded-lg font-bold shadow-lg shadow-emerald-500/20 transition-all flex items-center gap-2">
                Zapisz Szablon
            </button>
        </div>
    </div>

    <div class="lg:col-span-1">
        <div class="bg-slate-800 rounded-2xl border border-slate-700 sticky top-10 shadow-xl">
            <div class="p-5 border-b border-slate-700 bg-slate-800/50 rounded-t-2xl">
                <h3 class="font-bold text-lg text-white">Zmienne</h3>
                <p class="text-xs text-slate-400 mt-1">Wgraj dokument, aby edytować.</p>
            </div>

            <div class="p-5 space-y-6">
                <div class="flex gap-2">
                    <input type="text" id="var-name" disabled placeholder="Wgraj plik najpierw..." 
                           class="bg-slate-900 border border-slate-600 text-white text-sm rounded-lg w-full p-2.5 disabled:opacity-50 disabled:cursor-not-allowed focus:border-indigo-500 focus:outline-none transition-opacity">
                    <button id="add-var-btn" onclick="addNewVariable()" disabled 
                            class="bg-indigo-600 hover:bg-indigo-500 text-white p-2.5 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                        +
                    </button>
                </div>

                <div id="variables-list" class="flex flex-col gap-2 max-h-[500px] overflow-y-auto pr-2">
                    </div>
            </div>
        </div>
    </div>

</div>
