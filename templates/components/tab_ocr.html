<div id="drop-zone" class="bg-slate-800 p-10 rounded-2xl border-2 border-dashed border-slate-700 text-center shadow-2xl mb-10 relative overflow-hidden group transition-colors duration-300">
    
    <div id="loading-overlay" class="absolute inset-0 bg-slate-800/90 hidden flex-col items-center justify-center z-10">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
        <p class="text-blue-400 font-semibold animate-pulse">Przesyłanie plików...</p>
    </div>

    <div class="w-20 h-20 bg-blue-900/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-500/30 group-hover:scale-110 transition-transform duration-300 pointer-events-none">
        <svg class="w-10 h-10 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
    </div>
    
    <h2 class="text-2xl font-bold mb-2 text-white pointer-events-none">Wgraj Faktury</h2>
    <p class="text-slate-400 mb-8 max-w-md mx-auto text-sm pointer-events-none">Przeciągnij pliki tutaj (obsługa wielu naraz) lub kliknij przycisk.</p>
    
    <form id="uploadForm">
        <input type="file" name="file" id="invoice-upload" class="hidden" multiple onchange="handleFiles(this.files)">
        <button type="button" onclick="document.getElementById('invoice-upload').click()" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-3 rounded-xl transition-all font-semibold shadow-[0_0_20px_rgba(37,99,235,0.3)] hover:shadow-[0_0_30px_rgba(37,99,235,0.5)]">
            Wybierz pliki
        </button>
    </form>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    
    <div class="bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden flex flex-col h-full">
        
        <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800">
            <h3 class="font-semibold text-slate-200 flex items-center gap-2">
                <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Oczekujące
            </h3>
            <div class="flex gap-4 ">

         
            <button onclick="handleSelected('ocr')" class="flex items-center gap-1 bg-emerald-600/20 text-emerald-400 border border-emerald-600/30 px-3 py-1.5 rounded hover:bg-emerald-600 hover:text-white transition text-xs font-bold uppercase tracking-wider">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                OCR Zaznaczone
            </button>
            <button onclick="handleSelected('delete')" class="flex items-center gap-1 bg-red-600/20 text-red-400 border border-red-600/30 px-3 py-1.5 rounded hover:bg-red-600 hover:text-white transition text-xs font-bold uppercase tracking-wider">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                Usuń Zaznaczone
            </button>
   </div>
        </div>
       
        <div class="p-3 bg-slate-800 border-b border-slate-700 flex gap-2 justify-end">
          

            <label class="flex items-center gap-2 text-xs text-slate-400 cursor-pointer hover:text-white select-none">
                <input type="checkbox" onchange="toggleAll(this)" class="custom-checkbox w-4 h-4"> Zaznacz wszystko
            </label>
        </div>

       
        
        <div id="files-list-container">
            {% include 'file_list.html' %}
        </div>
    </div>

    <div class="bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden flex flex-col h-full">
        <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800">
            <h3 class="font-semibold text-slate-200 flex items-center gap-2">
                <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Gotowe Dane
            </h3>
        </div>
        <div class="p-4 space-y-3 overflow-y-auto max-h-[600px]">
            {% for p_file in processed %}
            <div class="flex items-center gap-3 p-3 bg-slate-800 rounded-lg border border-slate-700 group hover:border-emerald-500/50 transition cursor-default">
                <div class="w-8 h-8 rounded-full bg-emerald-500/10 flex items-center justify-center text-emerald-500 border border-emerald-500/20">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div class="overflow-hidden">
                    <p class="text-sm text-slate-300 truncate">{{ p_file }}</p>
                    <p class="text-xs text-slate-500">Przetworzono pomyślnie</p>
                </div>
            </div>
            {% else %}
            <div class="text-center p-8 text-slate-500 text-sm italic">Brak przetworzonych plików.</div>
            {% endfor %}
        </div>
    </div>
</div>
