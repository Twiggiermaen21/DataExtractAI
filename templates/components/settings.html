<div class="dashboard-content content-padded hidden" id="dashboard-settings">
    <div class="modern-container">
        <!-- Panel lewy: Ustawienia -->
        <div class="actions-column panel-flex" style="max-height: calc(100vh - 220px);">
            <!-- Karta: Bezpieczeństwo -->
            <div class="card-modern card-dark">
                <h3 class="modern-title">
                    <span
                        style="width: 8px; height: 24px; background: var(--accent-purple); border-radius: 4px; display: inline-block;"></span>
                    Profil i Bezpieczeństwo
                </h3>
                <div class="checkbox-group">
                    <div style="margin-bottom: 20px;">
                        <label
                            style="display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase;">Nazwa
                            konta</label>
                        <input type="text" id="settings-username" class="btn-modern btn-dark-modern"
                            style="width: 100%; text-align: left; background: rgba(255,255,255,0.03);"
                            placeholder="Np. Jan Kowalski">
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label
                            style="display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase;">Adres
                            e-mail</label>
                        <input type="email" id="settings-email" class="btn-modern btn-dark-modern"
                            style="width: 100%; text-align: left; background: rgba(255,255,255,0.03);"
                            placeholder="twoj@email.pl">
                    </div>

                    <!-- Status toast -->
                    <div id="settings-status" style="display: none; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; font-size: 0.85rem; font-weight: 500;"></div>

                    <div style="margin-bottom: 20px;">
                        <button class="btn-modern btn-emerald" id="settings-save-btn" style="width: 100%; margin-bottom: 12px;">
                            Zapisz ustawienia
                        </button>
                        <label
                            style="display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase;">Hasło
                            dostępowe</label>
                        <button class="btn-modern btn-gray-modern" onclick="openResetPasswordModal()"
                            style="width: 100%; text-align: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" style="margin-right: 8px; opacity: 0.7;">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            Resetuj Hasło
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
