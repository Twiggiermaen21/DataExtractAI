{% extends "emails/email_base.html" %}

{% block message %}
Otrzymaliśmy prośbę o zresetowanie hasła do Twojego konta w aplikacji iusfully.
Kliknij poniższy przycisk, aby ustawić nowe hasło:
{% endblock %}

{% block action %}
<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center">
            <a href="{{ reset_url }}"
                style="display: inline-block; padding: 14px 36px; background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%); color: #fff; text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 0.95rem;">
                Zresetuj hasło
            </a>
        </td>
    </tr>
    <tr>
        <td style="padding-top: 16px;">
            <p style="margin: 0; color: #71717a; font-size: 0.8rem; word-break: break-all;">
                Lub skopiuj ten link: <span style="color: #a78bfa;">{{ reset_url }}</span>
            </p>
        </td>
    </tr>
</table>
{% endblock %}
