<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Sukces' if success else 'Błąd' }} | iusfully</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern_ui.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body class="auth-body">
    <div class="auth-blob" style="top: -100px; left: -100px;"></div>
    <div class="auth-blob" style="bottom: -100px; right: -100px;"></div>

    <div class="auth-card" style="text-align: center;">
        <div class="auth-logo-section">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="auth-logo-img">
            <span class="auth-logo-text">iusfully</span>
        </div>

        {% if success %}
        <div style="font-size: 3.5rem; margin-bottom: 16px;">✅</div>
        <h2 class="auth-title" style="color: #34d399;">Gotowe!</h2>
        {% else %}
        <div style="font-size: 3.5rem; margin-bottom: 16px;">❌</div>
        <h2 class="auth-title" style="color: #f87171;">Wystąpił błąd</h2>
        {% endif %}

        <p class="auth-subtitle" style="margin-bottom: 32px;">{{ message }}</p>

        <a href="/login" class="auth-btn" style="display: inline-block; text-decoration: none; text-align: center;">
            Powrót do aplikacji
        </a>
    </div>
</body>

</html>
