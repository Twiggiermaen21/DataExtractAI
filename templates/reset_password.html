<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetuj hasło | iusfully</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern_ui.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body class="auth-body">
    <div class="auth-blob" style="top: -100px; left: -100px;"></div>
    <div class="auth-blob" style="bottom: -100px; right: -100px;"></div>

    <div class="auth-card">
        <div class="auth-logo-section">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="auth-logo-img">
            <span class="auth-logo-text">iusfully</span>
        </div>

        <h2 class="auth-title">Ustaw nowe hasło</h2>
        <p class="auth-subtitle">Wprowadź nowe hasło do swojego konta.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="auth-alert {{ 'auth-alert-danger' if category == 'danger' else 'auth-alert-success' if category == 'success' else 'auth-alert-info' }}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/auth/reset-password/{{ token }}">
            <div class="auth-form-group">
                <label class="auth-form-label">Nowe hasło</label>
                <input type="password" name="password" class="auth-form-input" placeholder="••••••••" required
                    minlength="8">
            </div>

            <div class="auth-form-group">
                <label class="auth-form-label">Potwierdź hasło</label>
                <input type="password" name="confirm_password" class="auth-form-input" placeholder="••••••••" required
                    minlength="8">
            </div>

            <button type="submit" class="auth-btn">Zmień hasło</button>
        </form>

        <div class="auth-footer-links">
            <a href="/login">Powrót do logowania</a>
        </div>
    </div>
</body>

</html>
