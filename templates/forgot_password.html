<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przypomnij hasło | iusfully</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern_ui.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body class="auth-body">
    <div class="auth-blob" style="top: -100px; left: -100px;"></div>
    <div class="auth-blob" style="bottom: -100px; right: -100px;"></div>

    <div class="auth-card">
        <div class="auth-logo-section">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="auth-logo-img">
            <span class="auth-logo-text">iusfully</span>
        </div>

        <h2 class="auth-title">Przypomnij hasło</h2>
        <p class="auth-subtitle">Podaj swój adres e-mail, a wyślemy Ci link do zresetowania hasła.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div
            class="auth-alert {{ 'auth-alert-danger' if category == 'danger' else 'auth-alert-success' if category == 'success' else 'auth-alert-info' }}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
            <div class="auth-form-group">
                <label class="auth-form-label">Adres e-mail</label>
                <input type="email" name="email" class="auth-form-input" placeholder="twoj@email.pl" required>
            </div>

            <button type="submit" class="auth-btn">Wyślij link resetujący</button>
        </form>

        <div class="auth-footer-links">
            <a href="/login">Powrót do logowania</a>
        </div>
    </div>
</body>

</html>
