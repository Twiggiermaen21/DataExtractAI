<div class="space-y-3 overflow-y-auto max-h-[500px] p-1">
    {% for file in files %}
    <div class="flex items-center justify-between p-4 bg-slate-800 border border-slate-700 rounded-xl group hover:border-blue-500/50 transition-all">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg flex items-center justify-center bg-slate-700/50 text-slate-400 group-hover:bg-blue-600/20 group-hover:text-blue-400 transition-colors">
                {% if file.endswith('.docx') %}
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                {% else %}
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                {% endif %}
            </div>
            <div>
                <p class="font-medium text-slate-200 text-sm">{{ file }}</p>
                <p class="text-xs text-slate-500">Szablon dokumentu</p>
            </div>
        </div>
        
        <button class="text-slate-600 hover:text-red-400 transition p-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
    </div>
    {% else %}
    <div class="text-center p-10 border-2 border-dashed border-slate-700/50 rounded-xl">
        <p class="text-slate-500 text-sm">Brak szablonów w bibliotece.</p>
    </div>
    {% endfor %}
</div>
