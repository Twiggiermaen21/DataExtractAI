<html lang="pl"><head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0">
    <title>Podsumowanie Faktur</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        h1 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            font-size: 24px;
        }

        #podsumowanie-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .summary-item {
            border: 1px solid #d0d8f0;
            border-radius: 8px;
            overflow: hidden;
            page-break-inside: avoid;
        }

        .summary-header {
            background: #f0f4ff;
            padding: 12px 16px;
            font-weight: 600;
            color: #2e4a8f;
            border-bottom: 1px solid #d0d8f0;
            font-size: 16px;
        }

        .summary-body {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background-color: #ffffff;
        }

        .field-row {
            display: flex;
            flex-direction: column;
        }

        .field-label {
            font-size: 0.85em;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .field-value {
            font-size: 1.05em;
            font-weight: 500;
            color: #222;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 600px) {
            .summary-body {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            body {
                padding: 0;
                background: white;
            }

            .container {
                box-shadow: none;
                padding: 0;
                margin: 0;
                max-width: 100%;
            }

            .summary-item {
                margin-bottom: 20px;
            }
        }
    </style>
<style>
