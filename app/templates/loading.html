<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Ładowanie Iusfully...</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .loader {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 8px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            margin-bottom: 30px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .text-container {
            text-align: center;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.95rem;
            color: #9ca3af;
            line-height: 1.5;
        }

        .status {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #6b7280;
            font-family: monospace;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="text-container">
        <h1>Inicjalizacja Sieci Neuronowej</h1>
        <p>Proszę czekać. Model AI jest właśnie ładowany do pamięci karty graficznej.</p>
        <p class="status">Oczekiwanie na odpowiedź lokalnego serwera llama.cpp...</p>
    </div>
</body>
</html>
